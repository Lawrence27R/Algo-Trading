<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📈 Dhan Algo Trading Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #0d1117; --card: #161b22; --border: #30363d;
      --green: #3fb950; --red: #f85149; --blue: #58a6ff;
      --yellow: #d29922; --text: #e6edf3; --muted: #8b949e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
    header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1.4rem; color: var(--blue); }
    .mode-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; background: var(--yellow); color: #000; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; text-align: center; transition: transform 0.2s; }
    .stat-card:hover { transform: translateY(-3px); }
    .stat-card .label { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; }
    .positive { color: var(--green); } .negative { color: var(--red); } .neutral { color: var(--blue); }
    .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 28px; }
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
    .chart-card h3 { margin-bottom: 14px; font-size: 1rem; color: var(--blue); }
    .table-section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 28px; }
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .table-header h3 { font-size: 1rem; color: var(--blue); }
    .search-bar { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; color: var(--text); font-size: 0.85rem; width: 220px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead th { text-align: left; color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
    thead th:hover { color: var(--blue); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:hover { background: #1c2128; }
    tbody td { padding: 10px 12px; }
    .badge { padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .badge-buy { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge-sell { background: rgba(248,81,73,0.15); color: var(--red); }
    .badge-paper { background: rgba(88,166,255,0.15); color: var(--blue); }
    .badge-live { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .verify-btn { background: none; border: 1px solid var(--border); color: var(--blue); border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 0.78rem; transition: all 0.2s; }
    .verify-btn:hover { background: var(--blue); color: #000; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 500px; max-width: 90vw; }
    .modal h3 { margin-bottom: 16px; color: var(--blue); }
    .modal pre { background: var(--bg); border-radius: 8px; padding: 14px; font-size: 0.82rem; overflow-x: auto; color: var(--green); }
    .modal-close { margin-top: 16px; background: var(--red); color: #fff; border: none; border-radius: 6px; padding: 8px 18px; cursor: pointer; }
    .refresh-btn { background: var(--blue); color: #000; border: none; border-radius: 6px; padding: 7px 18px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <h1>📈 Dhan Algo Trading Dashboard</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <span><span class="status-dot"></span><span style="font-size:0.82rem;color:var(--muted)">Live Feed</span></span>
    <span class="mode-badge" id="mode-badge">PAPER</span>
  </div>
</header>
<div class="container">
  <div class="stats-grid">
    <div class="stat-card"><div class="label">Total Trades</div><div class="value neutral" id="stat-total">–</div></div>
    <div class="stat-card"><div class="label">Buy Orders</div><div class="value positive" id="stat-buys">–</div></div>
    <div class="stat-card"><div class="label">Sell Orders</div><div class="value negative" id="stat-sells">–</div></div>
    <div class="stat-card"><div class="label">Total P&L</div><div class="value" id="stat-pnl">–</div></div>
    <div class="stat-card"><div class="label">Available Cash</div><div class="value neutral" id="stat-cash">–</div></div>
  </div>
  <div class="charts-grid">
    <div class="chart-card"><h3>📊 P&L Over Time</h3><div id="pnl-chart" style="height:280px;"></div></div>
    <div class="chart-card"><h3>🥧 Trade Distribution</h3><div id="pie-chart" style="height:280px;"></div></div>
  </div>
  <div class="chart-card" style="margin-bottom:28px;">
    <h3>📈 Trade Volume by Symbol</h3>
    <div id="bar-chart" style="height:250px;"></div>
  </div>
  <div class="table-section">
    <div class="table-header">
      <h3>🗒️ Trade Log</h3>
      <div style="display:flex;gap:10px;align-items:center;">
        <input class="search-bar" id="search-input" placeholder="🔍 Search symbol..." oninput="filterTrades()" />
        <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th onclick="sortTable('timestamp')">Time ↕</th>
          <th onclick="sortTable('symbol')">Symbol ↕</th>
          <th>Type</th>
          <th onclick="sortTable('quantity')">Qty ↕</th>
          <th onclick="sortTable('price')">Price ↕</th>
          <th>Mode</th>
          <th>Status</th>
          <th>Verify</th>
        </tr>
      </thead>
      <tbody id="trade-tbody"></tbody>
    </table>
  </div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>🔍 Trade Verification</h3>
    <pre id="modal-content"></pre>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>
<script>
  let allTrades = [];
  let sortKey = 'timestamp';
  let sortAsc = false;
  const socket = io();
  socket.on('connect', () => console.log('WS connected'));

  async function loadAll() { await loadStats(); await loadTrades(); }

  async function loadStats() {
    const res = await fetch('/api/stats');
    const data = await res.json();
    document.getElementById('stat-total').textContent = data.total_trades;
    document.getElementById('stat-buys').textContent = data.buys;
    document.getElementById('stat-sells').textContent = data.sells;
    document.getElementById('stat-cash').textContent = '₹' + data.cash.toLocaleString('en-IN');
    const pnl = data.total_pnl;
    const pnlEl = document.getElementById('stat-pnl');
    pnlEl.textContent = (pnl >= 0 ? '+' : '') + '₹' + pnl.toLocaleString('en-IN');
    pnlEl.className = 'value ' + (pnl >= 0 ? 'positive' : 'negative');
    renderPnLChart(data.pnl_history);
    renderPieChart(data.buys, data.sells);
  }

  async function loadTrades() {
    const res = await fetch('/api/trades');
    allTrades = await res.json();
    renderTable(allTrades);
    renderBarChart(allTrades);
  }

  function renderTable(trades) {
    const sorted = [...trades].sort((a, b) => {
      let va = a[sortKey] || '', vb = b[sortKey] || '';
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
    const search = document.getElementById('search-input').value.toLowerCase();
    const filtered = sorted.filter(t => (t.symbol || '').toLowerCase().includes(search));
    const tbody = document.getElementById('trade-tbody');
    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:24px;">No trades yet. Start trading to see data here.</td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(t => `
      <tr>
        <td style="color:var(--muted);font-size:0.8rem;">${new Date(t.timestamp).toLocaleString('en-IN')}</td>
        <td><strong>${t.symbol}</strong></td>
        <td><span class="badge badge-${t.transaction_type?.toLowerCase()}">${t.transaction_type}</span></td>
        <td>${t.quantity}</td>
        <td>₹${(t.price || 0).toLocaleString('en-IN')}</td>
        <td><span class="badge badge-${t.mode}">${(t.mode || '').toUpperCase()}</span></td>
        <td style="color:var(--green)">${t.status}</td>
        <td><button class="verify-btn" onclick="verifyTrade('${t.id}')">Verify</button></td>
      </tr>
    `).join('');
  }

  function filterTrades() { renderTable(allTrades); }

  function sortTable(key) {
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = true; }
    renderTable(allTrades);
  }

  async function verifyTrade(id) {
    const res = await fetch(`/api/verify_trade/${id}`);
    const data = await res.json();
    document.getElementById('modal-content').textContent = JSON.stringify(data, null, 2);
    document.getElementById('modal').classList.add('active');
  }

  function closeModal() { document.getElementById('modal').classList.remove('active'); }

  function renderPnLChart(history) {
    const labels = history.map((_, i) => `Trade ${i + 1}`);
    const values = history.map(h => h.pnl);
    const cumulative = values.reduce((acc, v, i) => { acc.push((acc[i-1] || 0) + v); return acc; }, []);
    Plotly.newPlot('pnl-chart', [{
      x: labels, y: cumulative, type: 'scatter', mode: 'lines+markers',
      line: { color: '#3fb950', width: 2 },
      marker: { color: cumulative.map(v => v >= 0 ? '#3fb950' : '#f85149'), size: 6 },
      fill: 'tozeroy', fillcolor: 'rgba(63,185,80,0.1)', name: 'Cumulative P&L'
    }], {
      paper_bgcolor: '#161b22', plot_bgcolor: '#161b22',
      font: { color: '#e6edf3', size: 11 },
      margin: { t: 10, b: 30, l: 50, r: 10 },
      xaxis: { gridcolor: '#30363d' }, yaxis: { gridcolor: '#30363d' }
    }, { responsive: true, displayModeBar: false });
  }

  function renderPieChart(buys, sells) {
    Plotly.newPlot('pie-chart', [{
      labels: ['Buy Orders', 'Sell Orders'], values: [buys || 0, sells || 0],
      type: 'pie', hole: 0.5,
      marker: { colors: ['#3fb950', '#f85149'] },
      textinfo: 'label+percent', textfont: { color: '#e6edf3' }
    }], {
      paper_bgcolor: '#161b22', plot_bgcolor: '#161b22',
      font: { color: '#e6edf3', size: 11 },
      margin: { t: 10, b: 10, l: 10, r: 10 }, showlegend: false
    }, { responsive: true, displayModeBar: false });
  }

  function renderBarChart(trades) {
    const symbolMap = {};
    trades.forEach(t => { symbolMap[t.symbol] = (symbolMap[t.symbol] || 0) + (t.quantity || 0); });
    Plotly.newPlot('bar-chart', [{
      x: Object.keys(symbolMap), y: Object.values(symbolMap),
      type: 'bar', marker: { color: '#58a6ff' }, name: 'Volume'
    }], {
      paper_bgcolor: '#161b22', plot_bgcolor: '#161b22',
      font: { color: '#e6edf3', size: 11 },
      margin: { t: 10, b: 40, l: 50, r: 10 },
      xaxis: { gridcolor: '#30363d' }, yaxis: { gridcolor: '#30363d' }
    }, { responsive: true, displayModeBar: false });
  }

  loadAll();
  setInterval(loadAll, 15000);
</script>
</body>
</html>
